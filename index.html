<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Page Website</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      line-height: 1.6;
    }

    header {
      background: #333;
      color: #fff;
      padding: 15px 0;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    section {
      padding: 80px 20px;
      min-height: 100vh;
    }

    #home { background: #f4f4f4; }
    #about { background: #ddd; }
    #services { background: #bbb; }
    #contact { background: #999; }

    h1 {
      margin-bottom: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #333;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #555;
    }

    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 10px;
    }
  </style>
</head>
<body>

<header>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section id="home">
  <div class="container">
    <h1>Welcome</h1>
    <p>This is a simple one-page website.</p>
    <button onclick="showMessage()">Click Me</button>
    <p id="message"></p>
  </div>
</section>

<section id="about">
  <div class="container">
    <h1>About</h1>
    <p>This section tells about the website.</p>
  </div>
</section>

<section id="services">
  <div class="container">
    <h1>Services</h1>
    <p>We provide web development services.</p>
  </div>
</section>

<section id="contact">
  <div class="container">
    <h1>Contact</h1>
    <p>Email: example@email.com</p>
  </div>
</section>

<footer>
  <p>© 2026 One Page Website</p>
</footer>

<script>
  function showMessage() {
    document.getElementById("message").innerText = "You clicked the button!";
  }

  // Smooth scrolling
  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function(e) {
      e.preventDefault();
      document.querySelector(this.getAttribute('href')).scrollIntoView({
        behavior: 'smooth'
      });
    });
  });
</script>

</body>
</html>
